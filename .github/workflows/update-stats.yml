name: Update GitHub Stats

on:
  schedule:
    # This cron expression runs the script every day at midnight UTC
    - cron: '0 0 * * *' 
  workflow_dispatch: 
    # This allows you to click a button in GitHub to run it manually anytime

permissions:
  contents: write # Allows the bot to push the updated JSON file back to your repo

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Python Script
        env:
          # This pulls the PAT you saved in the secrets earlier
          GH_TOKEN: ${{ secrets.STATS_PAT }}
        run: python fetch_stats.py

      - name: Commit and Push changes
        run: |
          # We tell Git to act as the official GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.json
          
          # This line checks if the stats actually changed. If they did, it commits and pushes.
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update github stats"
          git push